server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;  # PDFs for RAG knowledge base

    # MCP — buffering off for SSE streaming, 300s for long scans and terraform ops
    location /mcp {
        proxy_pass http://backend:8000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /rag/ {
        proxy_pass http://backend:8000/rag/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /terraform/ {
        proxy_pass http://backend:8000/terraform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # 600s for model pulls which can take several minutes
    location /api/ollama/ {
        proxy_pass http://backend:8000/api/ollama/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /tools/ {
        proxy_pass http://backend:8000/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Catch-all for React Router — unmatched URLs serve index.html instead of 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
