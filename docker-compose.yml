services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env        # copy backend/.env.example → backend/.env and fill in keys
    volumes:
      - chroma_data:/app/chroma_db        # ChromaDB vector data
      - terraform_workdirs:/app/terraform_workdirs  # tfstate and workdirs
    expose:
      - "8000"                # internal only — Nginx proxies to this
    extra_hosts:
      - "host.docker.internal:host-gateway"  # lets backend reach Ollama on the host (Linux only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # allows sentence-transformers to load on first start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"             # app available at http://localhost
    depends_on:
      backend:
        condition: service_healthy   # waits for backend /health to return 200
    restart: unless-stopped

# Persist data across docker compose down / up
volumes:
  chroma_data:
  terraform_workdirs:
